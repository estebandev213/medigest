<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediGest - Gestión de Pacientes</title>
    <link rel="stylesheet" th:href="@{/styles/global.css}">
    <link rel="stylesheet" th:href="@{/styles/dashboard.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-layout">

        <div th:replace="~{fragments/dashboard-nav :: sidebar('pacientes')}"></div>

        <div class="main-wrapper">

            <div th:replace="~{fragments/dashboard-nav :: topbar('Módulo de Admisión - Pacientes', 'Añadir Paciente', 'fas fa-user-plus', 'modalPaciente')}"></div>

            <main class="main-content">

                <div class="kpi-container">
                    <div class="kpi-card text-success">
                        <h3>Pacientes Totales</h3>
                        <p class="kpi-value" th:text="${totalPacientes}">0</p>
                        <span class="kpi-sub">Registrados en Admisión</span>
                    </div>
                    <div class="kpi-card text-primary">
                        <h3>Estado del Módulo</h3>
                        <p class="kpi-value">Activo</p>
                        <span class="kpi-sub">Sincronizado con base de datos</span>
                    </div>
                </div>

                <div class="table-container">
                    <table class="pacientes-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Paciente</th>
                                <th>DNI</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                                <th>Tipo de Seguro</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="paciente : ${listaPacientes}">
                                <td th:text="${paciente.id}">1</td>
                                <td>
                                    <div class="patient-name-cell">
                                        <div class="avatar-circle avatar-sm">
                                            <i class="fas fa-user"></i>
                                        </div>
                                        <span th:text="${paciente.nombres + ' ' + paciente.apellidos}">Juan Carlos Pérez</span>
                                    </div>
                                </td>
                                <td th:text="${paciente.dni}">77455477</td>
                                <td th:text="${paciente.telefono != null and !#strings.isEmpty(paciente.telefono) ? paciente.telefono : '—'}">999888777</td>
                                <td th:text="${paciente.email != null and !#strings.isEmpty(paciente.email) ? paciente.email : '—'}">correo@ejemplo.com</td>
                                <td>
                                    <span class="badge-tipo" th:text="${paciente.tipo}">SIS</span>
                                </td>
                                <td>
                                    <button type="button" class="btn-action" title="Ver Historial">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(listaPacientes)}">
                                <td colspan="7" class="table-empty">
                                    No hay pacientes registrados en la base de datos.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </main>
        </div>
    </div>

    <div id="modalPaciente" class="modal-overlay hidden">
        <div class="modal-content-box">
            <div class="modal-header">
                <h3>Añadir Nuevo Paciente</h3>
                <button type="button" class="close-btn" data-modal-close="modalPaciente">&times;</button>
            </div>

            <form th:action="@{/dashboard/pacientes/registrar}" method="post">
                <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="dni">Documento Nacional de Identidad (DNI)</label>
                    <input type="text" id="dni" name="dni" placeholder="8 dígitos" maxlength="8"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="nombres">Nombres</label>
                        <input type="text" id="nombres" name="nombres" placeholder="Ej. Juan Carlos" required>
                    </div>
                    <div class="form-group">
                        <label for="apellidos">Apellidos</label>
                        <input type="text" id="apellidos" name="apellidos" placeholder="Ej. Pérez Gómez" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telefono">Teléfono Celular</label>
                        <input type="text" id="telefono" name="telefono" placeholder="Ej. 999888777" maxlength="9"
                               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                    <div class="form-group">
                        <label for="fechaNacimiento">Fecha de Nacimiento</label>
                        <input type="date" id="fechaNacimiento" name="fechaNacimiento">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="paciente@correo.com">
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Ej. Av. La Marina 123, Lima">
                </div>

                <div class="form-group">
                    <label for="tipo">Tipo de Seguro</label>
                    <select id="tipo" name="tipo" required>
                        <option value="SIS">SIS</option>
                        <option value="PARTICULAR">Particular</option>
                        <option value="SEGURO_PRIVADO">Seguro Privado</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-modal-close="modalPaciente">Cancelar</button>
                    <button type="submit" class="btn-submit">Registrar Paciente</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/scripts/dashboard.js}"></script>
</body>
</html>
