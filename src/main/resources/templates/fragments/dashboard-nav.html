<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head></head>
<body>

    <aside th:fragment="sidebar(seccionActiva)" class="sidebar">
        <div class="sidebar-brand">
            <a th:href="@{/dashboard}" class="logo">Medi<span>Gest</span></a>
        </div>
        <nav class="sidebar-menu">
            <a th:href="@{/dashboard}" class="menu-item" th:classappend="${seccionActiva == 'citas'} ? 'active' : ''">
                <i class="fas fa-calendar-alt"></i> Mis Citas
            </a>
            <a th:href="@{/dashboard/pacientes}" class="menu-item" th:classappend="${seccionActiva == 'pacientes'} ? 'active' : ''">
                <i class="fas fa-user-injured"></i> Pacientes
            </a>
            <a th:href="@{/dashboard/buscar-medicos}" class="menu-item" th:classappend="${seccionActiva == 'medicos'} ? 'active' : ''">
                <i class="fas fa-user-md"></i> Buscar Médicos
            </a>
            <a th:href="@{/dashboard/historial-clinico}" class="menu-item" th:classappend="${seccionActiva == 'historial'} ? 'active' : ''">
                <i class="fas fa-file-medical"></i> Historial Clínico
            </a>
            <a th:href="@{/dashboard/facturacion}" class="menu-item" th:classappend="${seccionActiva == 'facturacion'} ? 'active' : ''">
                <i class="fas fa-file-invoice-dollar"></i> Facturación
            </a>
            <a th:href="@{/dashboard/perfil}" class="menu-item" th:classappend="${seccionActiva == 'perfil'} ? 'active' : ''">
                <i class="fas fa-user"></i> Mi Perfil
            </a>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="menu-item logout">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </a>
        </div>
    </aside>

    <div th:fragment="flashAlert">
        <div th:if="${mensaje}" th:class="'flash-alert flash-' + (${tipoMensaje} ?: 'success')">
            <i th:class="${tipoMensaje == 'error'} ? 'fas fa-exclamation-circle' : 'fas fa-check-circle'"></i>
            <span th:text="${mensaje}">Mensaje</span>
            <button type="button" class="flash-close" onclick="this.closest('.flash-alert').remove()" aria-label="Cerrar">&times;</button>
        </div>
    </div>

    <header th:fragment="topbar(titulo, accionTexto, accionIcono, modalId)" class="topbar">
        <div class="topbar-left">
            <h2 th:text="${titulo}">Título</h2>
        </div>
        <button th:if="${!#strings.isEmpty(accionTexto)}"
                type="button"
                class="btn-primary btn-open-modal"
                th:attr="data-modal-target=${modalId}">
            <i th:class="${accionIcono}"></i>
            <span th:text="${accionTexto}">Acción</span>
        </button>
        <div class="topbar-right">
            <div class="user-info">
                <span class="user-name">Admin MediGest</span>
                <div class="user-avatar">AD</div>
            </div>
        </div>
    </header>

</body>
</html>
