<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediGest - Mis Citas</title>
    <link rel="stylesheet" th:href="@{/styles/global.css}">
    <link rel="stylesheet" th:href="@{/styles/dashboard.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <template>
        <aside th:fragment="miSidebar(seccionActiva)" class="sidebar">
            <div class="sidebar-brand">
                <a href="#" class="logo">Medi<span>Gest</span></a>
            </div>
            <nav class="sidebar-menu">
                <a th:href="@{/dashboard}" class="menu-item" th:classappend="${seccionActiva == 'citas'} ? 'active' : ''">
                    <i class="fas fa-calendar-alt"></i> Mis Citas
                </a>
                <a th:href="@{/dashboard/pacientes}" class="menu-item" th:classappend="${seccionActiva == 'pacientes'} ? 'active' : ''">
                    <i class="fas fa-user-injured"></i> Pacientes
                </a>
                <a th:href="@{/dashboard/buscar-medicos}" class="menu-item" th:classappend="${seccionActiva == 'medicos'} ? 'active' : ''">
                    <i class="fas fa-user-md"></i> Buscar Médicos
                </a>
                <a th:href="@{/dashboard/historial-clinico}" class="menu-item" th:classappend="${seccionActiva == 'historial'} ? 'active' : ''">
                    <i class="fas fa-file-medical"></i> Historial Clínico
                </a>
                <a href="#" class="menu-item" th:classappend="${seccionActiva == 'perfil'} ? 'active' : ''">
                    <i class="fas fa-user"></i> Mi Perfil
                </a>
            </nav>
            <div class="sidebar-footer">
                <a th:href="@{/logout}" class="menu-item logout">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
            </div>
        </aside>

        <header th:fragment="miTopbar(tituloPantalla)" class="topbar">
            <div class="topbar-left">
                <h2 th:text="${tituloPantalla}">Título</h2>
            </div>
            <button class="btn-primary" onclick="abrirModal()">
                <i class="fas fa-plus"></i> Nueva Cita
            </button>
            <div class="topbar-right">
                <div class="user-info">
                    <span class="user-name">Admin MediGest</span>
                    <div class="user-avatar">AD</div>
                </div>
            </div>
        </header>
    </template>

    <div class="dashboard-layout">

        <div th:replace="~{this :: miSidebar('citas')}"></div>

        <div class="main-wrapper">

            <div th:replace="~{this :: miTopbar('Mis Citas Médicas')}"></div>

            <main class="main-content">

                <div class="kpi-container">
                    <div class="kpi-card text-primary">
                        <h3>Próxima Cita</h3>
                        <p class="kpi-value">Hoy</p>
                        <span class="kpi-sub">Ver monitoreo abajo</span>
                    </div>
                    <div class="kpi-card text-success">
                        <h3>Citas Totales</h3>
                        <p class="kpi-value" th:text="${totalCitas}">0</p>
                        <span class="kpi-sub">Registradas en sistema</span>
                    </div>
                    <div class="kpi-card text-warning">
                        <h3>Estado</h3>
                        <p class="kpi-value">Activo</p>
                        <span class="kpi-sub">Filtros operando OK</span>
                    </div>
                </div>

                <div class="cards-grid">
                    <div class="appointment-card" th:each="cita : ${misCitas}">
                        <div class="card-header">
                            <span class="insurance-badge" th:text="${cita.paciente != null ? cita.paciente.tipo : cita.tipo}">SIS</span>
                            <span class="status-badge"
                                th:styleappend="${#strings.toUpperCase(cita.estado) == 'CONFIRMADA' ? 'background-color: #DCFCE7 !important; color: #15803D !important;' : (#strings.toUpperCase(cita.estado) == 'CANCELADA' ? 'background-color: #FEE2E2 !important; color: #991B1B !important;' : 'background-color: #FEF9C3 !important; color: #A16207 !important;')}"
                                th:text="${cita.estado}">
                                CONFIRMADA
                            </span>
                        </div>

                        <div class="card-body">
                            <div class="patient-info">
                                <div class="avatar-circle">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <h4 th:text="${cita.paciente != null ? (cita.paciente.nombres + ' ' + cita.paciente.apellidos) : (cita.nombres + ' ' + cita.apellidos)}">Juan Carlos Pérez</h4>
                                    <p class="dni-text">Código Paciente: <span th:text="${cita.paciente != null ? cita.paciente.id : cita.pacienteId}">1</span></p>
                                </div>
                            </div>

                            <div class="appointment-details">
                                <div class="detail-item">
                                    <i class="fas fa-user-md"></i>
                                    <div>
                                        <strong th:text="${cita.medicoAsignado}">Dr. Rodriguez</strong>
                                        <p th:text="${cita.especialidad}">Medicina General</p>
                                    </div>
                                </div>

                                <div class="detail-item">
                                    <i class="fas fa-clock"></i>
                                    <div>
                                        <p class="date-highlight" th:text="${#strings.replace(cita.fechaHora, 'T', ' ')}">2026-06-25 10:00:00</p>
                                    </div>
                                </div>

                                <div class="detail-item motivo">
                                    <i class="fas fa-notes-medical"></i>
                                    <p th:text="${cita.motivo}">Control rutinario</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="modalCita" class="modal-overlay" style="display: none;">
        <div class="modal-content-box">
            <div class="modal-header">
                <h3>Programar Nueva Cita</h3>
                <button class="close-btn" onclick="cerrarModal()">&times;</button>
            </div>

            <form action="/dashboard/programar-cita" method="POST">
                <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label>Código del Paciente (ID Relacional)</label>
                    <input type="text" name="pacienteId" placeholder="Ej. 1" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                </div>

                <div class="form-group">
                    <label>Especialidad Médica</label>
                    <select name="especialidad" id="selectEspecialidad" onchange="actualizarMedicos()" required>
                        <option value="" disabled selected>-- Seleccione Especialidad --</option>
                        <option value="Cardiología">Cardiología</option>
                        <option value="Pediatría">Pediatría</option>
                        <option value="Medicina General">Medicina General</option>
                        <option value="Ginecología">Ginecología</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Médico Asignado</label>
                    <select name="medicoAsignado" id="selectMedico" required>
                        <option value="" disabled selected>-- Primero elija especialidad --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Fecha y Hora</label>
                    <input type="datetime-local" name="fechaHora" required>
                </div>
                <div class="form-group">
                    <label>Motivo de Consulta</label>
                    <textarea name="motivo" rows="3" placeholder="Describa brevemente el motivo..." required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn-submit">Guardar Cita</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const medicosPorEspecialidad = {
            "Cardiología": ["Dr. Esteban Villagarcia", "Dr. Keiko Carpio", "Dr. Alan Barrientos"],
            "Pediatría": ["Dr. Leonidas Frames", "Dr. Carlos Delgado"],
            "Medicina General": ["Dr. Jeanfranco Lazarinos", "Dr. Fernando Lizarraga", "Dra. ByeHello Pauca"],
            "Ginecología": ["Dr. Franco Newvillage"]
        };

        function actualizarMedicos() {
            const comboEspecialidad = document.getElementById("selectEspecialidad");
            const comboMedico = document.getElementById("selectMedico");
            const especialidadSeleccionada = comboEspecialidad.value;

            comboMedico.innerHTML = '<option value="" disabled selected>-- Seleccione Médico --</option>';
            const medicos = medicosPorEspecialidad[especialidadSeleccionada];

            if (medicos) {
                medicos.forEach(medico => {
                    const option = document.createElement("option");
                    option.value = medico;
                    option.textContent = medico;
                    comboMedico.appendChild(option);
                });
            }
        }

        function abrirModal() { document.getElementById('modalCita').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modalCita').style.display = 'none'; }
    </script>
</body>
</html>
