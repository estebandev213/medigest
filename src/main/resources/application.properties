# spring.application.name está al final del archivo

# H2 en archivo (persiste entre reinicios)
spring.datasource.url=jdbc:h2:file:./data/medigest;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Consola H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.application.name=MediGest

server.tomcat.max-http-header-size=65536

# Perfil stub: DNI de prueba (12345678, 87654321, 11223344) sin token.
# Para RENIEC real: export SPRING_PROFILES_ACTIVE=prod y export APIPERU_TOKEN="..."
spring.profiles.active=${SPRING_PROFILES_ACTIVE:stub}

