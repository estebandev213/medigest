# spring.application.name está al final del archivo

# H2 en archivo (persiste entre reinicios)
spring.datasource.url=jdbc:h2:file:./data/medigest;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Consola H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.application.name=MediGest

# API Perú - Consulta DNI (padrón reducido SUNAT / apiperu.dev)
apiperu.api.base-url=https://apiperu.dev/api
apiperu.api.token=${APIPERU_TOKEN:}
